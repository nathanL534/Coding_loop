# gitleaks config. Pre-commit and CI run this to catch accidental secret commits.
title = "Coding Loop gitleaks config"

[extend]
useDefault = true

# Project-specific rules
[[rules]]
id = "telegram-bot-token"
description = "Telegram bot token"
regex = '''\d{8,10}:[A-Za-z0-9_-]{35}'''
tags = ["telegram", "secret"]

[[rules]]
id = "anthropic-api-key"
description = "Anthropic API key"
regex = '''sk-ant-[A-Za-z0-9_-]{20,}'''
tags = ["anthropic", "secret"]

[[rules]]
id = "google-oauth-client-secret"
description = "Google OAuth client secret"
regex = '''GOCSPX-[A-Za-z0-9_-]{28}'''
tags = ["google", "secret"]

[allowlist]
description = "Known-safe placeholders"
regexes = [
    '''PASTE_BOT_TOKEN_HERE''',
    '''GOCSPX-xxxxxxxx''',
]
paths = [
    '''claude-bridge/config\.example\.toml''',
]
