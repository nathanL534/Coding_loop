name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Bridge tests
        working-directory: claude-bridge
        run: |
          uv venv
          uv pip install -e ".[dev]"
          uv run pytest
      - name: Agent tests
        working-directory: agent
        run: |
          uv venv
          uv pip install -e ".[dev]"
          uv run pytest
      - name: Verify safety manifest
        working-directory: claude-bridge
        run: uv run python -m bridge.manifest verify ..

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build --build-arg AGENT_UID=10001 --build-arg AGENT_GID=10001 -t coding-loop-agent:ci .
